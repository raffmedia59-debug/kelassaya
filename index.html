<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengecekan Kelas - Dalam Perbaikan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 40px 30px;
        }

        .icon-box {
            background-color: #fff8e6;
            color: #d97706;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-box svg {
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-block;
            background-color: #e2e8f0;
            color: #475569;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Ikon Perkakas / Maintenance -->
        <div class="icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.83-5.83M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 01-3.586 0 2.548 2.548 0 010-3.586l5.653-4.655m3.03-2.496a3.375 3.375 0 00-.766-1.208l-3.03-2.496m0 0L3.75 3.75M12.75 7.5l2.25 2.25" />
            </svg>
        </div>

        <h1>Mohon Maaf</h1>
        <p>Halaman pengecekan kelas siswa sedang dalam pemeliharaan sistem. Kami sedang melakukan pembaruan data untuk meningkatkan kenyamanan Anda.</p>
        
        <span class="badge">Sistem Kembali Segera</span>
    </div>

</body>
</html>
