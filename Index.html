    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
        }
        h2 {
            color: #1e293b;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        button {
            background-color: #2563eb;
            color: #ffffff;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .result-box {
            margin-top: 25px;
            display: none;
        }
        .result-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 15px;
        }
        .result-item {
            margin-bottom: 10px;
            font-size: 15px;
            color: #334155;
        }
        .result-item:last-of-type {
            margin-bottom: 0;
        }
        .result-item strong {
            color: #0f172a;
            display: inline-block;
            width: 160px;
        }
        .badge-sudah {
            background-color: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            display: inline-block;
        }
        .badge-pending {
            background-color: #fef3c7;
            color: #92400e;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            display: inline-block;
        }
        .notice-text {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e1;
            font-size: 13px;
            color: #e11d48;
            font-style: italic;
            line-height: 1.4;
        }
        .not-found {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

    function cariSiswa() {
        const inputNama = document.getElementById('namaSiswa').value.trim().toLowerCase();
        const resultBox = document.getElementById('resultBox');

        if (inputNama === "") {
            resultBox.style.display = "block";
            resultBox.innerHTML = '<div class="not-found">Silahkan masukkan nama siswa terlebih dahulu.</div>';
            return;
        }

        const hasil = dataSiswa.filter(s => s.nama.toLowerCase().includes(inputNama));

        if (hasil.length > 0) {
            resultBox.style.display = "block";
            let html = "";
            
            hasil.forEach(s => {
                const isSudah = s.status.toUpperCase() === "SUDAH";
                const badgeClass = isSudah ? "badge-sudah" : "badge-pending";
                
                html += `
                    <div class="result-card">
                        <div class="result-item"><strong>Nama Lengkap:</strong> ${s.nama}</div>
                        <div class="result-item"><strong>Kelas:</strong> ${s.kelas}</div>
                        <div class="result-item"><strong>Status Daftar Ulang:</strong> <span class="${badgeClass}">${s.status}</span></div>
                        <div class="notice-text">
                            * Jika sudah daftar ulang tapi kelas tidak muncul, silahkan konfirmasi kebagian Tata Usaha
                        </div>
                    </div>
                `;
            });

            resultBox.innerHTML = html;
        } else {
            resultBox.style.display = "block";
            resultBox.innerHTML = '<div class="not-found">Data siswa tidak ditemukan. Pastikan ejaan nama sudah benar.</div>';
        }
    }

    document.getElementById("namaSiswa").addEventListener("keyup", function(e) {
        if (e.key === "Enter") {
            cariSiswa();
        }
    });
</script>
